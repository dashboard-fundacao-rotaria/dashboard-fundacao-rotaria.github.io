<div class="faixa-topo"></div>

<!-- O menu de abas é gerado pelo js/nav.js a partir de UMA lista única
     (a lista TABS no topo daquele arquivo) — editar o menu em 15 lugares
     não é mais necessário; edite só js/nav.js. -->
<nav class="tabs-relatorio" id="tabs-relatorio" aria-label="Navegação do relatório"></nav>


<!--
  TESTE: antes essa página mostrava a imagem estática do Canva no desktop
  (min-width:900px) e só usava esse grid dinâmico no mobile. Trocamos pra
  usar o grid em qualquer tela — vantagem: nunca mais fica desatualizado,
  edite só js/equipe.js. Se quiser voltar pro esquema anterior (imagem do
  Canva no desktop), volte a colocar aqui:
  <div class="canva-full">
    <img src="assets/equipe/equipe-canva.png" alt="..." class="canva-img">
  </div>
  ...e reative a media query ".canva-full{display:none}" abaixo de 900px
  em css/styles.css (procure "TESTE: grid substituindo Canva" lá).
-->

<!--
  Páginas com imagem do Canva já têm essa faixa colorida grossa
  desenhada dentro do próprio PNG. Como tiramos a imagem daqui (ver
  comentário acima), a faixa precisa ser recriada em CSS — mesmo padrão
  usado em Destaques — pra manter a mesma identidade visual das outras
  páginas.
-->
<div class="faixa-decorativa"></div>

<main class="pagina-conteudo pagina-conteudo-full pagina-equipe">
  <div class="equipe-conteudo-fallback">
    <h2 class="secao-titulo">Nossa Equipe</h2>
    <p class="secao-desc">
      Fundação Rotária &middot; Rotaract Brasil &middot; Ano Rotário 2026-27
    </p>
    <div id="destaque-equipe"></div>
    <div class="grid-equipe" id="grid-equipe"></div>
  </div>
</main>


<footer class="site-footer">
  <p class="footer-copy">Rotaract Brasil &middot; Fundação Rotária &middot; Ano Rotário 2026-27</p>
</footer>
<script src="js/chaves-acesso.js"></script>
<script src="js/nav.js" data-pagina-atual="equipe.html"></script>
<script src="js/equipe.js"></script>
